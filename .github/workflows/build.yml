name: Build

on:
        push:
                branches: [main]
        schedule:
                - cron: "0 * * * *"
        workflow_dispatch:

jobs:
        build:
                runs-on: ubuntu-latest
                permissions:
                        contents: write

                steps:
                        - name: Checkout
                          uses: actions/checkout@v4

                        - name: Setup Bun
                          uses: oven-sh/setup-bun@v2
                          with:
                                  bun-version: latest

                        - name: Install dependencies
                          run: bun install --frozen-lockfile

                        - name: Run index
                          run: bun index.ts

                        - name: Commit changes
                          uses: stefanzweifel/git-auto-commit-action@v5
                          with:
                                  commit_message: "updated readme"
                                  repository: .
