name: Build

on:
        push:
                branches: [main]
        schedule:
                - cron: "0 * * * *"
        workflow_dispatch:

jobs:
        prettier:
                runs-on: ubuntu-latest
                permissions:
                        contents: write

                steps:
                        - name: Checkout
                          uses: actions/checkout@v4
                          with:
                                  ref: ${{ github.event.pull_request.head.ref || github.ref }}

                        - name: Setup Bun
                          uses: oven-sh/setup-bun@v1

                        - name: Install dependencies
                          run: bun install
                          working-directory: .

                        - name: Run index
                          run: bun index.ts
                          working-directory: .

                        - name: Commit changes
                          uses: stefanzweifel/git-auto-commit-action@v5
                          with:
                                  commit_message: "updated readme"
                                  repository: .
